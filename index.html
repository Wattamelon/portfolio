<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Pages Test</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --card: #fffaf2;
        --text: #1f1a17;
        --accent: #c26a3d;
        --line: #e4d6c8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(194, 106, 61, 0.18), transparent 32%),
          linear-gradient(180deg, var(--bg), #efe5d9);
        color: var(--text);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      main {
        width: min(680px, 100%);
        padding: 40px 32px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 50px rgba(70, 40, 20, 0.12);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        margin: 0 auto;
        max-width: 46ch;
        line-height: 1.7;
        font-size: 1rem;
      }

      .status {
        margin-top: 28px;
        display: inline-block;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(194, 106, 61, 0.12);
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">4-1 Mission</p>
      <h1>GitHub Pages Test</h1>
      <p>
        이 페이지가 보이면 현재 저장소의 GitHub Pages 배포 경로가 정상적으로 작동하고 있다는 뜻입니다.
        다음 단계에서는 이 테스트 페이지를 실제 포트폴리오 페이지로 교체하면 됩니다.
      </p>
      <div class="status">Pages deployment check in progress</div>
    </main>
  </body>
</html>
