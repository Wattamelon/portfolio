<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-version" content="v0.10.0" />
    <title>Moon's Portfolio</title>
    <script>
      (() => {
        let savedTheme = "";
        try {
          savedTheme = localStorage.getItem("moon-portfolio-theme") || "";
        } catch {
          savedTheme = "";
        }
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        document.documentElement.dataset.theme =
          savedTheme === "dark" || savedTheme === "light"
            ? savedTheme
            : systemTheme;
      })();
    </script>
    <link rel="stylesheet" href="./css/style.css?v0.10.0" />
    <script src="./js/config.js?v0.10.0" defer></script>
    <script src="./js/main.js?v0.10.0" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="build-badge" aria-label="Current build version">Build v0.10.0</div>
    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="brand" href="#top" aria-label="Go to home">Moon's Portfolio</a>
        <div class="header-controls">
          <button
            class="theme-button"
            type="button"
            aria-label="Switch to dark mode"
            data-theme-toggle
          >
            Theme
          </button>
          <button
            class="menu-button"
            type="button"
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="site-nav"
            data-menu-button
          >
            Menu
          </button>
        </div>
        <nav
          class="site-nav"
          id="site-nav"
          aria-label="Main navigation"
          data-nav
        >
          <a href="#hero">Home</a>
          <a href="#about">About</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main-content" tabindex="-1">
      <section class="hero section" id="hero" aria-labelledby="hero-title">
